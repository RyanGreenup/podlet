name: ollama
services:
  ollama:
    image: docker.io/ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama:Z
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Use `/dev/dri` for AMD / Nvidia
    # devices:
    #   - /dev/nvidia0:/dev/nvidia0
    #   - /dev/nvidiactl:/dev/nvidiactl
    #   - /dev/nvidia-uvm:/dev/nvidia-uvm
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "ollama list"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  ollama_data:
